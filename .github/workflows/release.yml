name: Rust Crate Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: dbkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dbkit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dbkit
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.0
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --workspace
      
      - name: Publish dbkit-core
        run: cargo publish -p dbkit-core --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      
      - name: Publish dbkit-derive
        run: cargo publish -p dbkit-derive --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      
      - name: Publish dbkit
        run: cargo publish -p dbkit --token ${CRATES_TOKEN}
        env:
          CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
